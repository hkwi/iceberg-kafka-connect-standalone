name: Sync Apache Iceberg

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      iceberg-ref:
        description: Apache Iceberg ref to sync
        required: true
        default: main
      iceberg-version:
        description: Iceberg artifact version to use for validating the synced connector build
        required: true
        default: '1.11.0'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check out standalone repository
        uses: actions/checkout@v4

      - name: Sync Apache Iceberg Kafka Connect sources
        run: |
          ref="${{ inputs['iceberg-ref'] || 'main' }}"
          scripts/sync-upstream.sh --iceberg-ref "${ref}"

      - name: Check whether sync changed files
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Open sync pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/apache-iceberg
          delete-branch: true
          commit-message: |
            Sync Kafka Connect from apache/iceberg
          title: Sync Kafka Connect from apache/iceberg
          body: |
            Synchronizes the standalone Kafka Connect repository with the latest
            selected Apache Iceberg upstream ref.

            The upstream commit is recorded in `UPSTREAM.md`.

            This sync workflow also builds the connector distribution zips from
            the proposed sync result and uploads them as workflow artifacts.

      - name: Set up Java for sync artifact build
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle for sync artifact build
        if: steps.changes.outputs.changed == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build connector distributions from sync result
        if: steps.changes.outputs.changed == 'true'
        run: |
          version="${{ inputs['iceberg-version'] || '1.11.0' }}"
          ./gradlew \
            -PicebergVersion="${version}" \
            :iceberg-kafka-connect-runtime:distZip \
            :iceberg-kafka-connect-runtime:hiveDistZip

      - name: Upload synced connector zip files
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: iceberg-kafka-connect-runtime-sync-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 14
          path: |
            upstream/kafka-connect/kafka-connect-runtime/build/distributions/*.zip
