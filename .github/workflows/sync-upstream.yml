name: Sync Apache Iceberg

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      iceberg-ref:
        description: Apache Iceberg ref to sync
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check out standalone repository
        uses: actions/checkout@v4

      - name: Sync Apache Iceberg Kafka Connect sources
        run: |
          ref="${{ inputs['iceberg-ref'] || 'main' }}"
          scripts/sync-upstream.sh --iceberg-ref "${ref}"

      - name: Check whether sync changed files
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Open sync pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/apache-iceberg
          delete-branch: true
          commit-message: |
            Sync Kafka Connect from apache/iceberg
          title: Sync Kafka Connect from apache/iceberg
          body: |
            Synchronizes the standalone Kafka Connect repository with the latest
            selected Apache Iceberg upstream ref.

            The upstream commit is recorded in `UPSTREAM.md`.
