name: Build Connector Distribution

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      iceberg-version:
        description: Iceberg artifact version to use for the standalone runtime build
        required: true
        default: '1.11.0'

permissions:
  contents: write

jobs:
  build-connector-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Check out standalone repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select Iceberg artifact version
        id: iceberg-version
        run: |
          version="${{ inputs['iceberg-version'] || '1.11.0' }}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build connector distributions
        run: |
          ./gradlew \
            -PicebergVersion="${{ steps.iceberg-version.outputs.version }}" \
            :iceberg-kafka-connect-runtime:distZip \
            :iceberg-kafka-connect-runtime:hiveDistZip

      - name: Upload connector zip files
        uses: actions/upload-artifact@v4
        with:
          name: iceberg-kafka-connect-runtime-${{ steps.iceberg-version.outputs.version }}
          if-no-files-found: error
          retention-days: 14
          path: |
            upstream/kafka-connect/kafka-connect-runtime/build/distributions/*.zip

      - name: Publish rolling snapshot release
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=standalone-snapshot
          title="Latest standalone connector snapshot"
          notes="Built from ${GITHUB_SHA} with Iceberg artifacts ${{ steps.iceberg-version.outputs.version }}. This prerelease is overwritten by the next main build or manual distribution build."

          git tag -f "${tag}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${tag}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --title "${title}" \
              --notes "${notes}" \
              --prerelease
          else
            gh release create "${tag}" \
              --title "${title}" \
              --notes "${notes}" \
              --prerelease \
              --target "${GITHUB_SHA}"
          fi

          gh release upload "${tag}" \
            upstream/kafka-connect/kafka-connect-runtime/build/distributions/*.zip \
            --clobber
